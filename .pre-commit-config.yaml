# Pinned revs below are a sane baseline; run `pre-commit autoupdate` to bump them.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml]
        files: ^backend/src/
        # Type the core runtime deps so mypy checks against real types (esp.
        # pydantic models) instead of treating them as Any — that's what makes
        # the gate catch real bugs.
        additional_dependencies:
          - pydantic>=2.0.0
          - fastapi>=0.111.0
          - google-genai>=0.8.0
          - types-Pillow

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
